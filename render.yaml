services:
  - type: web
    name: findit-server
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 8080
      - key: DB_PATH
        value: /var/data/findit.db
    disk:
      name: findit-data
      mountPath: /var/data
      sizeGB: 1
    healthCheckPath: /health
    autoDeploy: true
    buildFilter:
      paths:
        - "**/*"
      ignoredPaths:
        - "README.md"
        - ".gitignore"

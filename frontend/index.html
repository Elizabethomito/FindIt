<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindIt – Lost & Found</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🔍 FindIt</h1>
        <p>Lost & Found System</p>
    </header>

    <!-- Auth Section -->
    <section id="auth-section" class="container">
        <div class="card auth-card">
            <div class="tabs">
                <button class="tab active" onclick="showTab('login')">Login</button>
                <button class="tab" onclick="showTab('signup')">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
                <h2>Welcome Back</h2>
                <input type="email" id="login-email" placeholder="Email" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit" class="btn primary">Login</button>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="auth-form hidden" onsubmit="handleSignup(event)">
                <h2>Create Account</h2>
                <input type="text" id="signup-id" placeholder="User ID (e.g. u1)" required>
                <input type="email" id="signup-email" placeholder="Email" required>
                <input type="password" id="signup-password" placeholder="Password" required>
                <button type="submit" class="btn primary">Sign Up</button>
            </form>

            <p id="auth-message" class="message"></p>
        </div>
    </section>

    <!-- Main App (hidden until logged in) -->
    <section id="app-section" class="container hidden">
        <div class="user-bar">
            <span id="user-info">Logged in</span>
            <button class="btn secondary" onclick="logout()">Logout</button>
        </div>

        <!-- Report Item -->
        <div class="card">
            <h2>Report an Item</h2>
            <form id="item-form" onsubmit="handleCreateItem(event)">
                <select id="item-type" required>
                    <option value="">Type</option>
                    <option value="lost">Lost</option>
                    <option value="found">Found</option>
                </select>
                <input type="text" id="item-name" placeholder="Item Name (e.g. Black Phone)" required>
                <textarea id="item-description" placeholder="Description" rows="2"></textarea>
                <div class="form-row">
                    <input type="text" id="item-location" placeholder="Location (e.g. Nairobi)">
                    <input type="date" id="item-date">
                </div>
                <button type="submit" class="btn primary">Submit Report</button>
            </form>
            <p id="item-message" class="message"></p>
        </div>

        <!-- Items List -->
        <div class="card">
            <div class="items-header">
                <h2>Reported Items</h2>
                <div class="filters">
                    <button class="filter-btn active" onclick="filterItems('all')">All</button>
                    <button class="filter-btn" onclick="filterItems('lost')">Lost</button>
                    <button class="filter-btn" onclick="filterItems('found')">Found</button>
                </div>
            </div>
            <div id="items-list" class="items-grid">
                <p class="empty">No items reported yet.</p>
            </div>
        </div>
    </section>

    <!-- Item Detail Modal -->
    <div id="item-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modal-title">Item Details</h2>
            <div id="modal-body">
                <div class="detail-row">
                    <strong>Name:</strong>
                    <span id="modal-name"></span>
                </div>
                <div class="detail-row">
                    <strong>Type:</strong>
                    <span id="modal-type"></span>
                </div>
                <div class="detail-row">
                    <strong>Description:</strong>
                    <span id="modal-description"></span>
                </div>
                <div class="detail-row">
                    <strong>Location:</strong>
                    <span id="modal-location"></span>
                </div>
                <div class="detail-row">
                    <strong>Date:</strong>
                    <span id="modal-date"></span>
                </div>
                <div class="detail-row">
                    <strong>Reported by:</strong>
                    <span id="modal-user"></span>
                </div>
            </div>
            <button id="delete-btn" class="btn danger" onclick="deleteItem()">Delete Item</button>
        </div>
    </div>

    <footer>
        <p>FindIt – Elizabeth Atieno</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
